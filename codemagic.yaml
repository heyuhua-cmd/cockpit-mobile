# Codemagic CI/CD 配置 - Cockpit iOS 构建
# 用法：在 Codemagic 中连接此 GitHub 仓库，选择 "codemagic.yaml" 作为构建方式

workflows:
  ios-build:
    name: Cockpit iOS Build
    environment:
      xcode: latest
      cocoapods: default
      node: 18
    scripts:
      # 1. 安装依赖（使用 Yarn）
      - name: Install dependencies
        script: |
          yarn install --frozen-lockfile || yarn install

      # 2. 构建前端 Web 资源
      - name: Build web assets
        script: |
          yarn build

      # 3. 安装 Capacitor iOS 原生依赖
      - name: Install iOS native deps
        script: |
          cd ios/App
          pod install
          cd ../..

      # 4. 同步 Web 资源到 iOS
      - name: Sync to iOS
        script: |
          npx cap sync ios

      # 5. 构建 iOS (Debug IPA - 用于 AltStore 安装)
      - name: Build iOS Debug IPA
        script: |
          cd ios/App

          # 使用 debug 配置构建
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            clean build | xcpretty || true

          # 导出 IPA（未签名，需要后续用 AltStore 签名）
          mkdir -p build/ipa
          -cp -rP \
            build/Build/Products/Debug-iphoneos/App.app \
            build/Payload
          cd build && zip -r Payload.zip Payload && mv Payload.zip ../Cockpit-iOS-debug.ipa
          cd ..

      # 6. 归档产物
      - name: Archive artifacts
        script: |
          echo "iOS IPA 已生成: Cockpit-iOS-debug.ipa"
          ls -la *.ipa 2>/dev/null || echo "IPA 在 ios/App/build 目录"

    artifacts:
      - Cockpit-iOS-*.ipa
      - ios/App/build/**/*.ipa
