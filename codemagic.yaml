# Codemagic CI/CD 配置 - Cockpit iOS 构建
# 用法：在 Codemagic 中连接此 GitHub 仓库，选择 "codemagic.yaml" 作为构建方式

workflows:
  ios-build:
    name: Cockpit iOS Build
    environment:
      xcode: latest
      cocoapods: default
      node: 18
    scripts:
      # 1. 安装依赖（跳过 postinstall，手机 App 不需要 FFmpeg/go2rtc/SDL）
      - name: Install dependencies
        script: |
          # 创建空目录避免 postinstall 报错
          mkdir -p binaries/ffmpeg binaries/go2rtc
          # 使用 npm 安装（更稳定）
          npm ci --ignore-scripts || npm install --ignore-scripts

      # 2. 构建前端 Web 资源
      - name: Build web assets
        script: |
          npm run build

      # 3. 同步到 iOS（Capacitor 会自动处理原生依赖）
      - name: Sync to iOS and install native deps
        script: |
          npx cap sync ios
          cd ios/App
          pod install --repo-update || pod install
          cd ../..

      # 4. 构建 iOS (Debug IPA - 用于 AltStore 安装)
      - name: Build iOS Debug IPA
        script: |
          cd ios/App

          # 使用 debug 配置构建（不签名，后续用 AltStore 签名）
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            clean build 2>&1 | tee build.log | xcpretty || { echo "Build log:"; cat build.log; exit 1; }

          # 打包 IPA
          mkdir -p Payload
          cp -r "build/Build/Products/Debug-iphoneos/App.app" Payload/
          zip -ry Cockpit-iOS-debug.ipa Payload/
          ls -la Cockpit-iOS-debug.ipa

      # 5. 复制到根目录方便下载
      - name: Copy artifact
        script: |
          cp ios/App/Cockpit-iOS-debug.ipa . 2>/dev/null || true
          echo "=== BUILD COMPLETE ==="
          find . -name "*.ipa" 2>/dev/null | head -5

    artifacts:
      - "**/*.ipa"
