# Codemagic CI/CD 配置 - Cockpit iOS 构建
# 用法：在 Codemagic 中连接此 GitHub 仓库，选择 "codemagic.yaml" 作为构建方式

workflows:
  ios-build:
    name: Cockpit iOS Build
    environment:
      xcode: latest
      cocoapods: default
      node: 21.7.0
    scripts:
      # 1. 安装依赖（跳过 postinstall，手机 App 不需要 FFmpeg/go2rtc/SDL）
      - name: Install dependencies
        script: |
          # Codemagic 环境可能使用旧版 Node.js，Capacitor v8 需要 >=21
          # 检查并安装正确的 Node 版本
          echo "=== Current Node version ==="
          node --version
          if [ "$(node --version | cut -d'.' -f1 | tr -d 'v')" -lt 21 ]; then
            echo "Node version too old, installing Node 21 via nvm..."
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm install 21
            nvm use 21
            echo "=== After nvm: Node version ==="
            node --version
          fi

          # 创建空目录避免 postinstall 报错
          mkdir -p binaries/ffmpeg binaries/go2rtc
          # 使用 npm 安装（项目没有 package-lock.json，不能用 npm ci）
          npm install --ignore-scripts --legacy-peer-deps

      # 2. 构建前端 Web 资源
      - name: Build web assets
        script: |
          npm run build

      # 3. 初始化 iOS 平台并同步（Capacitor v8 需要 cap add ios 来生成完整原生项目）
      - name: Sync to iOS and install native deps
        script: |
          set -e

          echo "=== Step 1: Remove existing iOS directory (if any) ==="
          rm -rf ios

          echo "=== Step 2: Add iOS platform ==="
          npx cap add ios
          echo "=== Step 3: Check if iOS platform was created ==="
          ls -la ios/ || { echo "ERROR: ios/ directory not created by cap add ios"; exit 1; }
          ls -la ios/App/ || { echo "ERROR: ios/App/ directory not found"; exit 1; }

          echo "=== Step 4: Sync web assets to iOS ==="
          npx cap sync ios
          echo "=== Step 5: Final check ==="
          ls -la ios/App/
          [ -f ios/App/Podfile ] && echo "Podfile found" || echo "WARNING: No Podfile"

          cd ios/App
          if [ -f Podfile ]; then
            echo "=== Running pod install ==="
            pod install --repo-update || pod install
          else
            echo "WARNING: Podfile not found, listing directory contents:"
            ls -la
          fi
          cd ../..

      # 4. 构建 iOS (Debug IPA - 用于 AltStore 安装)
      - name: Build iOS Debug IPA
        script: |
          cd ios/App

          # 使用 debug 配置构建（不签名，后续用 AltStore 签名）
          # 注意：不使用 xcpretty（CI 环境可能未安装），直接输出日志
          set -e
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            clean build 2>&1 | tee build.log

          # 检查构建产物是否存在
          APP_PATH="build/Build/Products/Debug-iphoneos/App.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: App.app not found at $APP_PATH"
            echo "=== Build log ==="
            cat build.log
            exit 1
          fi

          echo "App.app size: $(du -sh "$APP_PATH")"

          # 打包 IPA
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -ry Cockpit-iOS-debug.ipa Payload/
          echo "IPA size: $(ls -lh Cockpit-iOS-debug.ipa | awk '{print $5}')"

      # 5. 复制到根目录方便下载
      - name: Copy artifact
        script: |
          if [ -f ios/App/Cockpit-iOS-debug.ipa ]; then
            cp ios/App/Cockpit-iOS-debug.ipa .
            echo "=== BUILD COMPLETE ==="
            ls -lh *.ipa
          else
            echo "ERROR: IPA file not found!"
            exit 1
          fi

    artifacts:
      - "**/*.ipa"
